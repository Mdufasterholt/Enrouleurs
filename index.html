<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Machines">
<title>Catalogue Machines</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #e8d44d;
    --accent2: #4da8e8;
    --text: #e8e8e4;
    --muted: #888880;
    --danger: #e86b4d;
    --green: #4de89a;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
    --radius: 6px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* SCREENS */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-back {
    background: none;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    white-space: nowrap;
  }

  .header-title {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .header-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* HOME SCREEN */
  .home-hero {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 24px 16px 20px;
  }

  .home-logo {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .home-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  .home-title span { color: var(--accent); }

  .home-desc {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
  }

  /* MACHINE CARDS */
  .machines-grid {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }

  .machine-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .machine-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }

  .machine-card:active { background: var(--surface2); }

  .machine-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .machine-name {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.2;
  }

  .machine-brand {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .machine-arrow {
    color: var(--accent);
    font-size: 18px;
    line-height: 1;
    margin-top: 2px;
  }

  .machine-stats {
    display: flex;
    gap: 16px;
    margin-top: 12px;
  }

  .machine-stat {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .machine-stat strong {
    color: var(--accent2);
    font-weight: 500;
  }

  /* ADD MACHINE */
  .add-machine-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    color: var(--muted);
    font-family: var(--font);
    font-size: 14px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: border-color 0.15s, color 0.15s;
  }

  .add-machine-btn:active { color: var(--accent); border-color: var(--accent); }

  /* MACHINE DETAIL */
  .search-bar-wrap {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .search-bar {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    width: 100%;
    outline: none;
  }

  .search-bar:focus { border-color: var(--accent); }
  .search-bar::placeholder { color: var(--muted); }

  /* SECTIONS LIST */
  .sections-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: calc(16px + var(--safe-bottom));
  }

  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
  }

  .section-card-header {
    padding: 13px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-card-header:active { background: var(--surface2); }

  .section-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    background: rgba(232,212,77,0.1);
    padding: 3px 7px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .section-name { font-size: 14px; font-weight: 500; flex: 1; }

  .section-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }

  .section-chevron { color: var(--muted); font-size: 12px; }

  /* SECTION DETAIL */
  .section-detail-wrap {
    flex: 1;
    overflow-y: auto;
    padding-bottom: calc(16px + var(--safe-bottom));
  }

  .plan-image-wrap {
    background: #fff;
    padding: 12px;
    margin: 12px;
    border-radius: var(--radius);
    overflow: hidden;
    touch-action: pinch-zoom;
    position: relative;
  }

  .plan-placeholder {
    background: var(--surface2);
    border-radius: 4px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: var(--muted);
    font-size: 13px;
    margin: 12px;
    border: 1px dashed var(--border);
  }

  .plan-placeholder .plan-icon { font-size: 32px; opacity: 0.4; }

  .plan-note {
    font-family: var(--mono);
    font-size: 10px;
    text-align: center;
    padding: 0 16px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* PARTS TABLE */
  .parts-table-wrap {
    margin: 0 12px 12px;
  }

  .parts-table-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    padding: 0 2px;
  }

  .parts-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .parts-table thead {
    background: var(--surface2);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  .parts-table th {
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  .parts-table td {
    padding: 8px 10px;
    border-bottom: 1px solid rgba(46,46,46,0.5);
    vertical-align: top;
  }

  .parts-table tr:last-child td { border-bottom: none; }

  .parts-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .part-ref {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
  }

  .part-pos {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
  }

  .part-note {
    font-size: 10px;
    color: var(--muted);
    font-style: italic;
  }

  /* SEARCH HIGHLIGHT */
  .highlight { background: rgba(232,212,77,0.25); color: var(--accent); border-radius: 2px; }

  .no-results {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 32px 16px;
    font-family: var(--mono);
  }

  /* INFO BANNER */
  .info-banner {
    background: rgba(77,168,232,0.08);
    border: 1px solid rgba(77,168,232,0.2);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin: 12px;
    font-size: 12px;
    color: var(--accent2);
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: flex-end;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 24px 20px calc(24px + var(--safe-bottom));
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
  }

  .modal-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .modal-desc {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .modal-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    width: 100%;
    outline: none;
    margin-bottom: 10px;
  }

  .modal-input:focus { border-color: var(--accent); }

  .modal-row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .btn {
    padding: 12px 20px;
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    flex: 1;
  }

  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  /* TAG */
  .tag {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    display: inline-block;
  }

  .tag-blue { background: rgba(77,168,232,0.15); color: var(--accent2); }

  /* Zoom pinch support */
  img.zoomable { width: 100%; height: auto; touch-action: pinch-zoom; }
</style>
</head>
<body>

<!-- SCREEN: HOME -->
<div class="screen active" id="screen-home">
  <div class="home-hero">
    <div class="home-logo">● Catalogue pièces détachées</div>
    <div class="home-title">Mes <span>Machines</span></div>
    <div class="home-desc">Sélectionne une machine pour accéder aux plans et pièces</div>
  </div>
  <div class="machines-grid" id="machines-list">
    <!-- machines injected here -->
    <button class="add-machine-btn" onclick="openAddModal()">
      <span style="font-size:18px">+</span> Ajouter une machine
    </button>
  </div>
</div>

<!-- SCREEN: MACHINE DETAIL -->
<div class="screen" id="screen-machine">
  <div class="header">
    <button class="header-back" onclick="goHome()">← Accueil</button>
    <div>
      <div class="header-title" id="machine-title">—</div>
      <div class="header-sub" id="machine-sub">—</div>
    </div>
  </div>
  <div class="search-bar-wrap">
    <input class="search-bar" type="search" placeholder="Rechercher une pièce ou un sous-ensemble…" id="search-input" oninput="filterSections()">
  </div>
  <div class="sections-list" id="sections-list"></div>
</div>

<!-- SCREEN: SECTION DETAIL -->
<div class="screen" id="screen-section">
  <div class="header">
    <button class="header-back" onclick="goMachine()">← Retour</button>
    <div>
      <div class="header-title" id="section-title">—</div>
      <div class="header-sub" id="section-pages">—</div>
    </div>
  </div>
  <div class="section-detail-wrap" id="section-detail-content"></div>
</div>

<!-- MODAL: ADD MACHINE -->
<div class="modal-overlay" id="add-modal" onclick="closeAddModal(event)">
  <div class="modal">
    <div class="modal-title">Ajouter une machine</div>
    <div class="modal-desc">Entrez le nom et le fabricant de votre machine. Les plans seront disponibles dès que vous aurez fourni le PDF correspondant.</div>
    <input class="modal-input" type="text" id="new-machine-name" placeholder="Nom du modèle (ex: FM5500H)" maxlength="40">
    <input class="modal-input" type="text" id="new-machine-brand" placeholder="Fabricant (ex: Fasterholt)" maxlength="40">
    <div class="modal-row">
      <button class="btn btn-secondary" onclick="closeAddModal()">Annuler</button>
      <button class="btn btn-primary" onclick="addMachine()">Ajouter</button>
    </div>
  </div>
</div>

// ============================================================
// APP STATE
// ============================================================
let machines = [
  {
    id: 'fm5500h',
    name: 'FM5500H',
    brand: 'Fasterholt',
    year: '2024',
    sections: FM5500H_SECTIONS
  }
];

let currentMachineId = null;
let currentSectionId = null;
let searchQuery = '';

// ============================================================
// NAVIGATION
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  currentMachineId = null;
  currentSectionId = null;
  searchQuery = '';
  renderHome();
  showScreen('home');
}

function goMachine() {
  currentSectionId = null;
  renderMachine(currentMachineId);
  showScreen('machine');
}

// ============================================================
// HOME
// ============================================================
function renderHome() {
  const list = document.getElementById('machines-list');
  let html = '';
  machines.forEach(m => {
    const totalParts = m.sections.reduce((acc, s) => acc + s.parts.length, 0);
    html += `
      <div class="machine-card" onclick="openMachine('${m.id}')">
        <div class="machine-card-header">
          <div>
            <div class="machine-name">${m.name}</div>
            <div class="machine-brand">${m.brand}</div>
          </div>
          <div class="machine-arrow">›</div>
        </div>
        <div class="machine-stats">
          <div class="machine-stat"><strong>${m.sections.length}</strong> sous-ensembles</div>
          <div class="machine-stat"><strong>${totalParts}</strong> pièces</div>
        </div>
      </div>`;
  });
  html += `<button class="add-machine-btn" onclick="openAddModal()"><span style="font-size:18px">+</span> Ajouter une machine</button>`;
  list.innerHTML = html;
}

function openMachine(id) {
  currentMachineId = id;
  renderMachine(id);
  showScreen('machine');
}

// ============================================================
// MACHINE DETAIL
// ============================================================
function renderMachine(id) {
  const machine = machines.find(m => m.id === id);
  if (!machine) return;
  document.getElementById('machine-title').textContent = machine.name;
  document.getElementById('machine-sub').textContent = machine.brand + ' · ' + machine.sections.length + ' sous-ensembles';
  document.getElementById('search-input').value = '';
  searchQuery = '';
  renderSections(machine);
}

function filterSections() {
  const machine = machines.find(m => m.id === currentMachineId);
  if (!machine) return;
  searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
  renderSections(machine);
}

function renderSections(machine) {
  const q = searchQuery;
  const list = document.getElementById('sections-list');
  let html = '';
  let anyResult = false;

  machine.sections.forEach(sec => {
    let matchingParts = [];
    if (q) {
      matchingParts = sec.parts.filter(p =>
        p.name.toLowerCase().includes(q) ||
        p.ref.toLowerCase().includes(q) ||
        p.pos.toLowerCase().includes(q)
      );
      const sectionMatch = sec.name.toLowerCase().includes(q);
      if (!sectionMatch && matchingParts.length === 0) return;
    }
    anyResult = true;
    const count = q ? matchingParts.length + ' rés.' : sec.parts.length + ' pièces';
    const nameDisplay = q ? highlight(sec.name, q) : sec.name;

    html += `
      <div class="section-card" onclick="openSection('${sec.id}')">
        <div class="section-card-header">
          <span class="section-num">${sec.pages}</span>
          <span class="section-name">${nameDisplay}</span>
          <span class="section-count">${count}</span>
          <span class="section-chevron">›</span>
        </div>
        ${q && matchingParts.length > 0 ? renderMatchPreview(matchingParts, q) : ''}
      </div>`;
  });

  if (!anyResult) {
    html = `<div class="no-results">Aucun résultat pour « ${q} »</div>`;
  }
  list.innerHTML = html;
}

function renderMatchPreview(parts, q) {
  const shown = parts.slice(0, 3);
  let html = '<div style="padding: 0 14px 10px; border-top: 1px solid rgba(46,46,46,0.5);">';
  shown.forEach(p => {
    html += `<div style="padding: 4px 0; font-size:12px; color:var(--muted); display:flex; gap:8px; align-items:baseline;">
      <span style="font-family:var(--mono);color:var(--accent);font-size:10px;min-width:24px;">N°${p.pos}</span>
      <span>${highlight(p.name, q)}</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--accent2);margin-left:auto;">${highlight(p.ref, q)}</span>
    </div>`;
  });
  if (parts.length > 3) {
    html += `<div style="font-size:11px;color:var(--muted);padding-top:2px;">+ ${parts.length - 3} autres…</div>`;
  }
  html += '</div>';
  return html;
}

function highlight(text, q) {
  if (!q) return text;
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return text;
  return text.slice(0, idx) + '<mark class="highlight">' + text.slice(idx, idx + q.length) + '</mark>' + text.slice(idx + q.length);
}

// ============================================================
// SECTION DETAIL
// ============================================================
function openSection(secId) {
  const machine = machines.find(m => m.id === currentMachineId);
  if (!machine) return;
  const sec = machine.sections.find(s => s.id === secId);
  if (!sec) return;
  currentSectionId = secId;

  document.getElementById('section-title').textContent = sec.name;
  document.getElementById('section-pages').textContent = 'Plans : ' + sec.pages;

  const q = searchQuery;

  let html = `
    <div class="info-banner">
      <span>ℹ</span>
      <span>Pour zoomer sur un plan, utilisez le pinch (écartement des doigts) directement sur le schéma ci-dessus dans le PDF d'origine.</span>
    </div>
    <div class="plan-placeholder">
      <div class="plan-icon">📐</div>
      <div>Plan éclaté — ${sec.name}</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px;">${sec.pages}</div>
    </div>
    <div class="parts-table-wrap">
      <div class="parts-table-title">LISTE DES PIÈCES DÉTACHÉES</div>
      <table class="parts-table">
        <thead><tr>
          <th>N°</th>
          <th>Référence</th>
          <th>Qté</th>
          <th>Désignation</th>
        </tr></thead>
        <tbody>`;

  const parts = q
    ? sec.parts.filter(p => p.name.toLowerCase().includes(q) || p.ref.toLowerCase().includes(q) || p.pos.toLowerCase().includes(q))
    : sec.parts;

  parts.forEach(p => {
    html += `<tr>
      <td class="part-pos">${p.pos}</td>
      <td class="part-ref">${highlight(p.ref, q)}</td>
      <td style="text-align:center;font-family:var(--mono);font-size:11px;">${p.qty}</td>
      <td>
        <div>${highlight(p.name, q)}</div>
        ${p.note ? `<div class="part-note">${p.note}</div>` : ''}
      </td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  document.getElementById('section-detail-content').innerHTML = html;
  showScreen('section');
}

// ============================================================
// ADD MACHINE MODAL
// ============================================================
function openAddModal() {
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('new-machine-name').focus(), 100);
}

function closeAddModal(e) {
  if (!e || e.target === document.getElementById('add-modal')) {
    document.getElementById('add-modal').classList.remove('open');
    document.getElementById('new-machine-name').value = '';
    document.getElementById('new-machine-brand').value = '';
  }
}

function addMachine() {
  const name = document.getElementById('new-machine-name').value.trim();
  const brand = document.getElementById('new-machine-brand').value.trim();
  if (!name) { document.getElementById('new-machine-name').focus(); return; }

  const id = 'machine_' + Date.now();
  machines.push({
    id,
    name,
    brand: brand || 'Fabricant inconnu',
    sections: []
  });

  closeAddModal();
  renderHome();
}
